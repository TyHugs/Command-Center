<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Department of Urology Administration — University of Michigan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #F8F5F0;
      --bg-warm: #F1EAE1;
      --bg-card: #FFFFFF;
      --bg-card-hover: #FDFBF8;
      --bg-stripe: #FCFAF7;
      --gold: #B8863A;
      --gold-light: #CFA05A;
      --gold-glow: rgba(184, 134, 58, 0.07);
      --gold-ring: rgba(184, 134, 58, 0.18);
      --gold-badge: rgba(184, 134, 58, 0.06);
      --navy: #1A2740;
      --navy-mid: #243352;
      --text: #1C2127;
      --text-2: #4E5964;
      --text-3: #7E8B96;
      --text-inv-1: #FFFFFF;
      --text-inv-2: rgba(255,255,255,0.55);
      --border: rgba(0,0,0,0.055);
      --border-warm: rgba(184,134,58,0.14);
      --border-strong: rgba(0,0,0,0.08);

      --s-nostart-bg: #EFECEA;
      --s-nostart: #827D78;
      --s-plan-bg: #ECEAF4;
      --s-plan: #695DA0;
      --s-prog-bg: #E2ECF8;
      --s-prog: #3D6CB4;
      --s-rev-bg: #F9EEDB;
      --s-rev: #A07C28;
      --s-done-bg: #DEF0E5;
      --s-done: #387A5C;
      --s-block-bg: #F8E1DE;
      --s-block: #B04840;
      --s-hold-bg: #ECEBE8;
      --s-hold: #76716A;

      --p-high-bg: #FAE4D0;
      --p-high: #B06C2E;
      --p-med-bg: #F9EEDB;
      --p-med: #96782C;
      --p-low-bg: #E8EDE8;
      --p-low: #5A7A5A;

      --sh-xs: 0 1px 2px rgba(28,33,39,0.03);
      --sh-sm: 0 1px 4px rgba(28,33,39,0.035), 0 2px 8px rgba(28,33,39,0.02);
      --sh-md: 0 4px 16px rgba(28,33,39,0.045), 0 1px 4px rgba(28,33,39,0.025);
      --sh-lg: 0 8px 32px rgba(28,33,39,0.06), 0 2px 8px rgba(28,33,39,0.025);
      --sh-gold: 0 3px 14px rgba(184,134,58,0.14);

      --r: 10px;
      --r-sm: 7px;
      --r-xs: 4px;
      --r-full: 999px;
      --ease: cubic-bezier(0.4,0,0.2,1);
      --t: 0.18s;
    }

    html, body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Loading Bar */
    .loading-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      transform: scaleX(0);
      transform-origin: left;
      z-index: 9999;
      transition: transform 0.3s var(--ease);
    }

    .loading-bar.active {
      animation: loading-pulse 1.5s var(--ease) infinite;
    }

    @keyframes loading-pulse {
      0% { transform: scaleX(0.3); }
      50% { transform: scaleX(0.8); }
      100% { transform: scaleX(0.3); }
    }

    /* Header */
    .header {
      background: var(--navy);
      color: var(--text-inv-1);
      padding: 0.8rem 2rem;
      border-bottom: 3px solid var(--gold);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--sh-md);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-accent {
      width: 3px;
      height: 30px;
      background: var(--gold);
      border-radius: var(--r-sm);
    }

    .header-content h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.1rem;
    }

    .header-content p {
      font-size: 0.75rem;
      color: var(--text-inv-2);
    }

    .sync-badge {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: var(--text-inv-2);
      background: rgba(184,134,58,0.12);
      padding: 0.6rem 1rem;
      border-radius: var(--r-full);
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 2s ease-in-out infinite;
    }

    .sync-dot.idle {
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* KPI Bar — Compact */
    .kpi-bar {
      background: var(--bg-warm);
      padding: 0.8rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      flex-wrap: wrap;
    }

    .kpi-card {
      text-align: center;
      position: relative;
      cursor: help;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .kpi-number {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 0.25rem;
    }

    .kpi-label {
      font-size: 0.8rem;
      color: var(--text-2);
      font-weight: 500;
    }

    .kpi-subtitle {
      font-size: 0.75rem;
      color: var(--text-3);
      margin-left: -0.3rem;
    }

    .kpi-tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-0.5rem);
      background: var(--navy);
      color: var(--text-inv-1);
      padding: 0.8rem 1rem;
      border-radius: var(--r-sm);
      font-size: 0.85rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--t) var(--ease);
      z-index: 10;
      box-shadow: var(--sh-lg);
    }

    .kpi-card:hover .kpi-tooltip {
      opacity: 1;
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 1rem 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .section {
      background: var(--bg-card);
      border-radius: var(--r);
      border: 1px solid var(--border);
      margin-bottom: 1rem;
      overflow: hidden;
      box-shadow: var(--sh-sm);
      transition: box-shadow var(--t) var(--ease);
    }

    .section:hover {
      box-shadow: var(--sh-md);
    }

    .section-header {
      background: linear-gradient(135deg, rgba(184,134,58,0.04), rgba(26,39,64,0.02));
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .section-header:hover {
      background: linear-gradient(135deg, rgba(184,134,58,0.07), rgba(26,39,64,0.04));
    }

    .section-title {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--navy);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-badge {
      background: var(--gold-badge);
      color: var(--gold);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.7rem;
      border-radius: var(--r-full);
      min-width: 2rem;
      text-align: center;
    }

    .section-toggle {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      font-size: 1rem;
      transition: transform var(--t) var(--ease);
    }

    .section.collapsed .section-toggle {
      transform: rotate(-90deg);
    }

    .section-content {
      padding: 1rem 1.2rem;
      max-height: 2000px;
      overflow: hidden;
      transition: max-height 0.3s var(--ease);
    }

    .section.collapsed .section-content {
      max-height: 0;
      padding: 0 1.2rem;
    }

    /* Team Workload — Compact Pills */
    .workload-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .workload-pill {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.85rem;
      background: var(--bg-stripe);
      border: 1px solid var(--border);
      border-radius: var(--r-full);
      cursor: default;
      transition: all var(--t) var(--ease);
      white-space: nowrap;
    }

    .workload-pill:hover {
      background: var(--bg-card);
      border-color: var(--border-warm);
      box-shadow: var(--sh-md);
      z-index: 10;
    }

    .workload-pill-name {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--navy);
    }

    .workload-pill-count {
      font-family: 'Fraunces', serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gold);
      background: var(--gold-badge);
      padding: 0.1rem 0.45rem;
      border-radius: var(--r-full);
      min-width: 1.4rem;
      text-align: center;
    }

    .workload-pill-dots {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .workload-pill-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: block;
    }

    .workload-popup {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 260px;
      background: var(--bg-card);
      border: 1px solid var(--border-warm);
      border-radius: var(--r);
      padding: 0.75rem;
      box-shadow: var(--sh-lg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s var(--ease), transform 0.15s var(--ease);
      transform: translateY(-4px);
      z-index: 20;
    }

    .workload-pill:hover .workload-popup {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .workload-popup-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }

    .workload-popup ul {
      list-style: none;
    }

    .workload-popup li {
      font-size: 0.85rem;
      padding: 0.3rem 0.4rem;
      color: var(--text-2);
      cursor: pointer;
      border-radius: var(--r-xs);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all var(--t) var(--ease);
    }

    .workload-popup li:hover {
      background: var(--gold-badge);
      color: var(--gold);
    }

    .workload-popup li .popup-status {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Priority Board */
    .priority-list {
      list-style: none;
    }

    .priority-item {
      display: grid;
      grid-template-columns: 24px 1fr 80px 80px 80px 70px 28px;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      margin-bottom: 0.4rem;
      background: var(--bg-card);
      cursor: grab;
      transition: all var(--t) var(--ease);
    }

    .priority-item:active {
      cursor: grabbing;
      opacity: 0.7;
    }

    .priority-item.dragging {
      opacity: 0.5;
      background: var(--bg-warm);
    }

    .priority-item:hover {
      background: var(--bg-card-hover);
      box-shadow: var(--sh-md);
    }

    .priority-rank {
      font-family: 'Fraunces', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--gold);
      text-align: center;
    }

    .priority-name {
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--navy);
      cursor: pointer;
      transition: color var(--t) var(--ease);
    }

    .priority-name:hover {
      color: var(--gold);
    }

    .priority-owner {
      font-size: 0.8rem;
      color: var(--text-3);
    }

    .priority-handle {
      cursor: grab;
      color: var(--text-3);
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Goals Section */
    .goals-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }

    .goals-progress {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.9rem;
      color: var(--text-2);
    }

    .goals-bar {
      width: 150px;
      height: 6px;
      background: var(--border);
      border-radius: var(--r-full);
      overflow: hidden;
    }

    .goals-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: var(--r-full);
      transition: width 0.3s var(--ease);
    }

    .goal-card {
      background: var(--bg-stripe);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 0.6rem 0.9rem;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      transition: all var(--t) var(--ease);
    }

    .goal-card:hover {
      background: var(--bg-card);
      border-color: var(--border-warm);
      box-shadow: var(--sh-sm);
    }

    .goal-details {
      flex: 1;
      min-width: 0;
    }

    .goal-details h3 {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--navy);
      margin-bottom: 0.15rem;
    }

    .goal-meta {
      display: flex;
      gap: 0.8rem;
      font-size: 0.8rem;
      color: var(--text-3);
    }

    .goal-notes {
      font-size: 0.8rem;
      color: var(--text-2);
      line-height: 1.3;
      max-height: 40px;
      overflow: hidden;
      margin-top: 0.15rem;
    }

    .goal-actions {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      flex-shrink: 0;
    }

    /* Project Tracker */
    .tracker-toolbar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .filter-select, .search-input, button {
      padding: 0.4rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.8rem;
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      transition: all var(--t) var(--ease);
    }

    .filter-select:hover, .search-input:hover {
      border-color: var(--border-warm);
      background: var(--bg-card-hover);
    }

    .filter-select:focus, .search-input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-ring);
    }

    button {
      background: var(--gold);
      color: var(--text-inv-1);
      border: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    button:hover {
      background: var(--gold-light);
      box-shadow: var(--sh-gold);
    }

    button:active {
      transform: scale(0.98);
    }

    .tracker-results {
      font-size: 0.9rem;
      color: var(--text-3);
      margin-bottom: 1rem;
    }

    .project-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .project-table thead {
      background: var(--bg-warm);
      border-bottom: 2px solid var(--border-warm);
    }

    .project-table th {
      text-align: left;
      padding: 0.45rem 0.5rem;
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--navy);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .project-table th:hover {
      background: rgba(184,134,58,0.1);
    }

    .project-table td {
      padding: 0.35rem 0.5rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .project-table tbody tr:hover {
      background: var(--bg-card-hover);
    }

    .table-star {
      width: 20px;
      height: 20px;
      border: 2px solid var(--text-3);
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--t) var(--ease);
      font-size: 0.8rem;
    }

    .table-star:hover {
      border-color: var(--gold);
      background: var(--gold-badge);
    }

    .table-star.starred {
      border-color: var(--gold);
      background: var(--gold);
      color: var(--text-inv-1);
    }

    .project-name {
      font-weight: 500;
      color: var(--navy);
      cursor: pointer;
      transition: color var(--t) var(--ease);
    }

    .project-name:hover {
      color: var(--gold);
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: var(--r-full);
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.s-nostart { background: var(--s-nostart-bg); color: var(--s-nostart); }
    .badge.s-plan { background: var(--s-plan-bg); color: var(--s-plan); }
    .badge.s-prog { background: var(--s-prog-bg); color: var(--s-prog); }
    .badge.s-rev { background: var(--s-rev-bg); color: var(--s-rev); }
    .badge.s-done { background: var(--s-done-bg); color: var(--s-done); }
    .badge.s-block { background: var(--s-block-bg); color: var(--s-block); }
    .badge.s-hold { background: var(--s-hold-bg); color: var(--s-hold); }

    .badge.p-high { background: var(--p-high-bg); color: var(--p-high); }
    .badge.p-med { background: var(--p-med-bg); color: var(--p-med); }
    .badge.p-low { background: var(--p-low-bg); color: var(--p-low); }

    .inline-select, .inline-input {
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.3rem 0.6rem;
      border-radius: var(--r-xs);
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      transition: all var(--t) var(--ease);
    }

    .inline-select:hover, .inline-input:hover {
      border-color: var(--border-warm);
      background: var(--bg-card-hover);
    }

    .inline-select:focus, .inline-input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 2px var(--gold-ring);
    }

    .overdue {
      color: #B04840;
      font-weight: 600;
    }

    .delete-btn {
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
      background: #B04840;
      color: white;
      border: none;
      border-radius: var(--r-xs);
      cursor: pointer;
      transition: all var(--t) var(--ease);
    }

    .delete-btn:hover {
      background: #A03C34;
      box-shadow: 0 2px 8px rgba(176,72,64,0.2);
    }

    /* Detail Panel */
    .detail-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--t) var(--ease);
      z-index: 200;
    }

    .detail-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .detail-panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 450px;
      background: var(--bg-card);
      box-shadow: var(--sh-lg);
      transform: translateX(100%);
      transition: transform var(--t) var(--ease);
      z-index: 250;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .detail-panel.active {
      transform: translateX(0);
    }

    .detail-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 32px;
      height: 32px;
      border: none;
      background: var(--border);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      transition: all var(--t) var(--ease);
    }

    .detail-close:hover {
      background: var(--border-warm);
      color: var(--text);
    }

    .detail-content {
      padding: 2rem 1.5rem;
      flex: 1;
    }

    .detail-title {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 1.5rem;
      padding-right: 2.5rem;
    }

    .detail-field {
      margin-bottom: 1.5rem;
    }

    .detail-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 0.4rem;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .detail-input, .detail-select, .detail-textarea {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text);
      transition: all var(--t) var(--ease);
    }

    .detail-input:focus, .detail-select:focus, .detail-textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-ring);
    }

    .detail-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .detail-read-only {
      padding: 0.8rem;
      background: var(--bg-warm);
      border-radius: var(--r-sm);
      font-size: 0.9rem;
      color: var(--text-3);
    }

    .detail-delete {
      background: #B04840;
      color: white;
      margin-top: 2rem;
    }

    .detail-delete:hover {
      background: #A03C34;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--t) var(--ease);
      z-index: 300;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--bg-card);
      border-radius: var(--r);
      padding: 2rem;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--sh-lg);
      animation: modal-slide 0.3s var(--ease);
    }

    @keyframes modal-slide {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-title {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 1.5rem;
    }

    .modal-field {
      margin-bottom: 1.5rem;
    }

    .modal-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 0.5rem;
      display: block;
    }

    .modal-input, .modal-select, .modal-textarea {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text);
    }

    .modal-input:focus, .modal-select:focus, .modal-textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-ring);
    }

    .modal-checkbox {
      width: auto;
      margin-right: 0.5rem;
    }

    .modal-checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 2rem;
    }

    .modal-button-cancel {
      background: var(--border);
      color: var(--text);
    }

    .modal-button-cancel:hover {
      background: var(--border-strong);
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 2rem;
      right: 2rem;
      z-index: 400;
      pointer-events: none;
    }

    .toast {
      background: var(--navy);
      color: var(--text-inv-1);
      padding: 1rem 1.5rem;
      border-radius: var(--r);
      margin-bottom: 1rem;
      box-shadow: var(--sh-lg);
      animation: toast-slide 0.3s var(--ease);
      pointer-events: auto;
      max-width: 400px;
    }

    @keyframes toast-slide {
      from {
        opacity: 0;
        transform: translateX(400px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .toast.error {
      background: #B04840;
    }

    .toast.success {
      background: #387A5C;
    }

    /* Footer */
    .footer {
      background: var(--navy);
      color: var(--text-inv-2);
      text-align: center;
      padding: 0.8rem;
      font-size: 0.75rem;
      border-top: 1px solid var(--border-strong);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .priority-item {
        grid-template-columns: 20px 1fr 70px 24px;
        gap: 0.5rem;
      }

      .detail-panel {
        width: 100%;
      }
    }

    @media (max-width: 768px) {
      .main {
        padding: 0.75rem;
      }

      .kpi-bar {
        gap: 1.2rem;
        padding: 0.6rem 1rem;
      }

      .kpi-number {
        font-size: 1.3rem;
      }

      .tracker-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .filter-select, .search-input, button {
        width: 100%;
      }

      .project-table {
        font-size: 0.75rem;
      }

      .project-table th, .project-table td {
        padding: 0.3rem 0.3rem;
      }

      .priority-item {
        grid-template-columns: 18px 1fr 22px;
        gap: 0.4rem;
      }

      .priority-rank {
        font-size: 0.9rem;
      }
    }

    @media print {
      .detail-panel, .detail-overlay, .modal-overlay, .loading-bar,
      .tracker-toolbar, .section-header, .toast, button, .delete-btn,
      .detail-close, .goal-actions, .inline-select {
        display: none !important;
      }

      body {
        background: white;
      }

      .section {
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>

  <!-- Detail Panel -->

  <div class="detail-panel" id="detailPanel">

      <div class="detail-row">

          <label class="detail-label">Domain</label>
          <select class="detail-select" id="detailDomain" onchange="updateDetailField('Domain')"></select>
        </div>
        <div class="detail-field">

      <div class="detail-row">

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ============================================================================
    // CONSTANTS & CONFIG
    // ============================================================================

    const API_URL = 'https://script.google.com/macros/s/AKfycbwDdeZBBx63c2Iexsd4Mrbt3lZ1bUjMdIJXlXV1QfRxD171i1GCvyaOmgGRsDxJIYk/exec';

    const STATUS_OPTIONS = ['Not Started', 'Under Review', 'In Progress', 'Actively Managed', 'Complete'];
    const PRIORITY_OPTIONS = ['High', 'Medium', 'Low'];
    const CATEGORY_OPTIONS = ['Future Project', 'Routine', 'Standard Work', 'Actively Managed', 'Annual Project'];
    const DOMAIN_OPTIONS = ['Billing', 'Faculty', 'Quality', 'Operations', 'Finance', 'Strategy'];
    const DURATION_OPTIONS = ['1 Hour', '1 Day', '1 Month', '1 Quarter', '1 Year'];

    const STATUS_CLASS = {
      'Not Started': 's-nostart',
      'Under Review': 's-rev',
      'In Progress': 's-prog',
      'Actively Managed': 's-plan',
      'Complete': 's-done'
    };

    const PRIORITY_CLASS = {
      'High': 'p-high',
      'Medium': 'p-med',
      'Low': 'p-low'
    };

    const DEFAULT_MEETINGS = [
      { title: 'CDA Leadership Huddle', day: 'monday', time: '10:00 AM', type: 'leadership', recurring: 'weekly' },
      { title: 'Chair Leadership Huddle', day: 'thursday', time: '10:00 AM', type: 'leadership', recurring: 'weekly' },
      { title: 'ELT Meeting', day: 'thursday', weekOfMonth: 3, time: '6:30 – 7:00 AM', type: 'leadership', recurring: 'monthly' }
    ];

    // ============================================================================
    // GLOBAL STATE
    // ============================================================================

    let data = { projects: [], goals: [], calendarEvents: [] };
    let filteredProjects = [];
    let currentDetailProject = null;
    let currentGoal = null;
    let tableViewActive = true;
    let refreshInterval = null;

    // ============================================================================
    // UTILITY FUNCTIONS
    // ============================================================================

    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr + 'T00:00:00');
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function isOverdue(endDate, status) {
      if (!endDate || status === 'Complete') return false;
      return new Date(endDate) < new Date();
    }

    function showLoading(show = true) {
      const bar = document.getElementById('loadingBar');
      if (show) {
        bar.classList.add('active');
      } else {
        bar.classList.remove('active');
      }
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function updateSyncBadge() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('syncTime').textContent = `Last synced ${hours}:${minutes}`;
      document.getElementById('syncDot').classList.remove('idle');
      setTimeout(() => {
        document.getElementById('syncDot').classList.add('idle');
      }, 2000);
    }

    // ============================================================================
    // LOCAL STORAGE
    // ============================================================================

    function getCollapsedSections() {
      return JSON.parse(localStorage.getItem('uro_collapsed') || '{}');
    }

    function setCollapsedSection(id, collapsed) {
      const sections = getCollapsedSections();
      sections[id] = collapsed;
      localStorage.setItem('uro_collapsed', JSON.stringify(sections));
    }

    function getPriorityRanks() {
      return JSON.parse(localStorage.getItem('uro_priorityRank') || '{}');
    }

    function setPriorityRanks(ranks) {
      localStorage.setItem('uro_priorityRank', JSON.stringify(ranks));
    }

    // ============================================================================
    // API CALLS
    // ============================================================================

    async function fetchData() {
      showLoading(true);
      try {
        const response = await fetch(API_URL);
        const result = await response.json();
        data = result;
        updateSyncBadge();
        render();
      } catch (error) {
        console.error('Fetch error:', error);
        showToast('Failed to sync data', 'error');
      } finally {
        showLoading(false);
      }
    }

    async function updateCell(row, column, value) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'update', row, column, value })
        });
        const result = await response.json();
        if (result.success) {
          showToast('Updated successfully');
          fetchData();
        } else {
          showToast('Update failed', 'error');
        }
      } catch (error) {
        console.error('Update error:', error);
        showToast('Error updating', 'error');
      }
    }

    async function addProject(projectData) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'add', ...projectData })
        });
        const result = await response.json();
        if (result.success) {
          showToast('Project created');
          fetchData();
        } else {
          showToast('Failed to create project', 'error');
        }
      } catch (error) {
        console.error('Add error:', error);
        showToast('Error creating project', 'error');
      }
    }

    async function deleteProject(row) {
      if (!confirm('Delete this project? This cannot be undone.')) return;
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'delete', row })
        });
        const result = await response.json();
        if (result.success) {
          showToast('Project deleted');
          closeDetailPanel();
          fetchData();
        } else {
          showToast('Failed to delete', 'error');
        }
      } catch (error) {
        console.error('Delete error:', error);
        showToast('Error deleting', 'error');
      }
    }

    async function addGoal(goalData) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'goal_add', ...goalData })
        });
        const result = await response.json();
        if (result.success) {
          showToast('Goal created');
          fetchData();
        } else {
          showToast('Failed to create goal', 'error');
        }
      } catch (error) {
        console.error('Goal add error:', error);
        showToast('Error creating goal', 'error');
      }
    }

    async function updateGoal(row, column, value) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'goal_update', row, column, value })
        });
        const result = await response.json();
        if (result.success) {
          showToast('Goal updated');
          fetchData();
        } else {
          showToast('Failed to update', 'error');
        }
      } catch (error) {
        console.error('Goal update error:', error);
        showToast('Error updating', 'error');
      }
    }

    async function deleteGoal(row) {
      if (!confirm('Delete this goal?')) return;
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'goal_delete', row })
        });
        const result = await response.json();
        if (result.success) {
          showToast('Goal deleted');
          closeGoalModal();
          fetchData();
        } else {
          showToast('Failed to delete', 'error');
        }
      } catch (error) {
        console.error('Goal delete error:', error);
        showToast('Error deleting', 'error');
      }
    }

    // ============================================================================
    // KPI BAR
    // ============================================================================

    function renderKPIBar() {
      const total = data.projects.length;
      const active = data.projects.filter(p => p.Status !== 'Complete').length;
      const inProgress = data.projects.filter(p => p.Status === 'In Progress').length;
      const overdue = data.projects.filter(p => {
        if (p.Status === 'Complete') return false;
        if (!p['End Date']) return false;
        return isOverdue(p['End Date'], p.Status);
      }).length;
      const aiEnabled = data.projects.filter(p => p['AI Potential?'] === 'Yes').length;
      const aiPercent = total > 0 ? Math.round((aiEnabled / total) * 100) : 0;
      const complete = data.projects.filter(p => p.Status === 'Complete').length;
      const completionRate = total > 0 ? Math.round((complete / total) * 100) : 0;

      const getTooltip = (projects) => {
        const names = projects.slice(0, 10).map(p => p.Project).join(', ');
        const more = projects.length > 10 ? ` ...and ${projects.length - 10} more` : '';
        return names + more;
      };

      const kpis = [
        { label: 'Total Projects', value: total, projects: data.projects },
        { label: 'Active', value: active, projects: data.projects.filter(p => p.Status !== 'Complete') },
        { label: 'In Progress', value: inProgress, projects: data.projects.filter(p => p.Status === 'In Progress') },
        { label: 'Needs Attention', value: overdue, projects: data.projects.filter(p => isOverdue(p['End Date'], p.Status)), warning: overdue > 0 },
        { label: 'AI Enabled', value: `${aiEnabled}`, subtitle: `${aiPercent}% of portfolio`, projects: data.projects.filter(p => p['AI Potential?'] === 'Yes') },
        { label: 'Completion Rate', value: `${completionRate}%`, projects: data.projects.filter(p => p.Status === 'Complete') }
      ];

      const bar = document.getElementById('kpiBar');
      bar.innerHTML = kpis.map(kpi => `
        <div class="kpi-card">
          <div class="kpi-number" style="${kpi.warning ? 'color: #B04840;' : ''}">${kpi.value}</div>
          <div>
            <div class="kpi-label">${kpi.label}</div>
            ${kpi.subtitle ? `<div class="kpi-subtitle">${kpi.subtitle}</div>` : ''}
          </div>
          <div class="kpi-tooltip">${getTooltip(kpi.projects)}</div>
        </div>
      `).join('');
    }

    // ============================================================================
    // TEAM WORKLOAD
    // ============================================================================

    function renderTeamWorkload() {
      const byOwner = {};
      data.projects.forEach(p => {
        if (p.Status === 'Complete') return;
        const owner = p.Owner || 'Unassigned';
        if (!byOwner[owner]) {
          byOwner[owner] = [];
        }
        byOwner[owner].push(p);
      });

      const sorted = Object.entries(byOwner)
        .sort((a, b) => b[1].length - a[1].length);

      const statusColor = {
        'Not Started': 'var(--s-nostart)',
        'In Progress': 'var(--s-prog)',
        'Under Review': 'var(--s-rev)',
        'Actively Managed': 'var(--s-plan)'
      };

      const grid = document.getElementById('workloadGrid');
      grid.innerHTML = sorted.map(([owner, projects]) => {
        const dots = projects.map(p => {
          const color = statusColor[p.Status] || 'var(--s-nostart)';
          return `<span style="background: ${color};"></span>`;
        }).join('');

        const projectList = projects.map(p => {
          const dotColor = statusColor[p.Status] || 'var(--s-nostart)';
          return `<li onclick="openDetailPanel('${p._row}')"><span class="popup-status" style="background: ${dotColor};"></span>${esc(p.Project)}</li>`;
        }).join('');

        return `
          <div class="workload-pill">
            <span class="workload-pill-name">${esc(owner)}</span>
            <span class="workload-pill-count">${projects.length}</span>
            <div class="workload-pill-dots">${dots}</div>
            <div class="workload-popup">
              <div class="workload-popup-title">${esc(owner)}'s Projects</div>
              <ul>${projectList}</ul>
            </div>
          </div>
        `;
      }).join('');
    }

    // ============================================================================

    // ============================================================================

    function renderPriorityBoard() {
      const highPriority = data.projects.filter(p => p.Priority === 'High');
      const ranks = getPriorityRanks();

      highPriority.sort((a, b) => {
        const rankA = ranks[a._row] !== undefined ? ranks[a._row] : 999;
        const rankB = ranks[b._row] !== undefined ? ranks[b._row] : 999;
        if (rankA !== rankB) return rankA - rankB;
        return a.Project.localeCompare(b.Project);
      });

      document.getElementById('priorityCount').textContent = highPriority.length;

      const list = document.getElementById('priorityList');
      list.innerHTML = highPriority.map((p, idx) => `
        <li class="priority-item" draggable="true" data-row="${p._row}">
          <div class="priority-rank">${idx + 1}</div>
          <div class="priority-name" onclick="openDetailPanel('${p._row}')">${esc(p.Project)}</div>
          <div class="priority-owner">${esc(p.Owner || '–')}</div>
          <span class="badge ${STATUS_CLASS[p.Status] || ''}">${esc(p.Status || '–')}</span>
          <span class="badge" style="background: var(--border); color: var(--text-3);">${esc(formatDate(p['End Date']))}</span>
          <span class="badge" style="background: var(--gold-badge); color: var(--gold);">${esc(p.Domain || '–')}</span>
          <div class="priority-handle">⋮</div>
        </li>
      `).join('');

      setupDragAndDrop();
    }

    function setupDragAndDrop() {
      const items = document.querySelectorAll('.priority-item');
      let draggedItem = null;

      items.forEach(item => {
        item.addEventListener('dragstart', (e) => {
          draggedItem = item;
          item.classList.add('dragging');
        });

        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          savePriorityOrder();
        });

        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (draggedItem && draggedItem !== item) {
            item.parentNode.insertBefore(draggedItem, item);
          }
        });
      });
    }

    async function savePriorityOrder() {
      const items = document.querySelectorAll('.priority-item');
      const ranks = {};
      items.forEach((item, idx) => {
        const row = parseInt(item.dataset.row);
        ranks[row] = idx + 1;
      });

      setPriorityRanks(ranks);

      for (const [row, rank] of Object.entries(ranks)) {
        await updateCell(parseInt(row), 'Priority Rank', rank);
      }
    }

    function applyFilters() {
      const statusFilter = document.getElementById('filterStatus').value;
      const priorityFilter = document.getElementById('filterPriority').value;
      const categoryFilter = document.getElementById('filterCategory').value;
      const domainFilter = document.getElementById('filterDomain').value;
      const ownerFilter = document.getElementById('filterOwner').value;
      const search = document.getElementById('searchInput').value.toLowerCase();

      filteredProjects = data.projects.filter(p => {
        if (statusFilter && p.Status !== statusFilter) return false;
        if (priorityFilter && p.Priority !== priorityFilter) return false;
        if (categoryFilter && p.Category !== categoryFilter) return false;
        if (domainFilter && p.Domain !== domainFilter) return false;
        if (ownerFilter && p.Owner !== ownerFilter) return false;
        if (search && !p.Project.toLowerCase().includes(search)) return false;
        return true;
      });

      document.getElementById('trackerResults').textContent = `Showing ${filteredProjects.length} of ${data.projects.length} projects`;

      if (tableViewActive) {
        renderTable();

        renderKanban();

    function sortTable(column) {
      if (filteredProjects[0] && !filteredProjects._sortColumn) {
        filteredProjects._sortColumn = column;
        filteredProjects._sortDesc = false;
      } else if (filteredProjects._sortColumn === column) {
        filteredProjects._sortDesc = !filteredProjects._sortDesc;
      } else {
        filteredProjects._sortColumn = column;
        filteredProjects._sortDesc = false;
      }

      filteredProjects.sort((a, b) => {
        const aVal = a[column] || '';
        const bVal = b[column] || '';
        const cmp = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
        return filteredProjects._sortDesc ? -cmp : cmp;
      });

      renderTable();
    }

    function toggleView() {
      tableViewActive = !tableViewActive;
      document.getElementById('tableView').style.display = tableViewActive ? 'block' : 'none';
      document.getElementById('kanbanView').style.display = tableViewActive ? 'none' : 'block';
      applyFilters();
    }

    function isStarred(row) {
      const ranks = getPriorityRanks();
      return ranks[row] !== undefined;
    }

    function toggleStar(row) {
      const ranks = getPriorityRanks();
      const project = data.projects.find(p => p._row === parseInt(row));
      if (!project) return;

      if (ranks[row] !== undefined) {
        delete ranks[row];
      } else {
        if (project.Priority !== 'High') {
          updateCell(parseInt(row), 'Priority', 'High');
        }
        const maxRank = Math.max(...Object.values(ranks), 0);
        ranks[row] = maxRank + 1;
      }

      setPriorityRanks(ranks);
      renderPriorityBoard();
    }

    function saveGoal() {
      const title = document.getElementById('goalTitle').value.trim();

      if (!title) {
        showToast('Goal title is required', 'error');
        return;
      }

      const goalData = {
        'Goal': title,
        'Owner': document.getElementById('goalOwner').value,
        'Target Date': document.getElementById('goalTargetDate').value,
        'Status': document.getElementById('goalStatus').value,
        'Notes': document.getElementById('goalNotes').value
      };

      if (currentGoal) {
        updateGoal(currentGoal._row, 'Goal', title);
        updateGoal(currentGoal._row, 'Owner', goalData.Owner);
        updateGoal(currentGoal._row, 'Target Date', goalData['Target Date']);
        updateGoal(currentGoal._row, 'Status', goalData.Status);
        updateGoal(currentGoal._row, 'Notes', goalData.Notes);
      } else {
        addGoal(goalData);
      }

      closeGoalModal();
    }

    // ============================================================================
    // SECTIONS
    // ============================================================================

    function setupSectionToggle() {
      document.querySelectorAll('.section-header').forEach(header => {
        header.addEventListener('click', () => {
          const section = header.closest('.section');
          const id = section.id;
          const isCollapsed = section.classList.toggle('collapsed');
          setCollapsedSection(id, isCollapsed);
        });
      });

      const collapsed = getCollapsedSections();
      Object.entries(collapsed).forEach(([id, isCollapsed]) => {
        if (isCollapsed) {
          const section = document.getElementById(id);
          if (section) section.classList.add('collapsed');
        }
      });
    }

    // ============================================================================
    // RENDER ORCHESTRATION
    // ============================================================================

    function render() {
      renderKPIBar();
      renderTeamWorkload();
      renderPriorityBoard();
      renderGoals();
      populateFilters();
      applyFilters();
    }

    // ============================================================================
    // INITIALIZATION
    // ============================================================================

    async function init() {
      setupSectionToggle();
      await fetchData();

      refreshInterval = setInterval(fetchData, 60000);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) fetchData();
      });
    }

    // Start the app
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
