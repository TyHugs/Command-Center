<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Management - Urology Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #F7F8FA;
      --bg-warm: #F5F2ED;
      --bg-card: #FFFFFF;
      --bg-card-hover: #FEFDFB;
      --bg-stripe: #FDFCFA;
      --gold: #C4943D;
      --gold-light: #D4A84F;
      --gold-glow: rgba(196,148,61,0.07);
      --gold-ring: rgba(196,148,61,0.18);
      --gold-badge: rgba(196,148,61,0.06);
      --navy: #0B1D3A;
      --navy-mid: #132D54;
      --text: #111827;
      --text-2: #4B5563;
      --text-3: #9CA3AF;
      --text-inv-1: #FFFFFF;
      --border: #E5E7EB;
      --border-warm: rgba(196,148,61,0.12);
      --border-strong: #D1D5DB;
      --sh-xs: 0 1px 2px rgba(28,33,39,0.03);
      --sh-sm: 0 1px 4px rgba(28,33,39,0.035), 0 2px 8px rgba(28,33,39,0.02);
      --sh-md: 0 4px 16px rgba(28,33,39,0.045), 0 1px 4px rgba(28,33,39,0.025);
      --s-queue-bg: #EFECEA;
      --s-queue: #827D78;
      --s-prog-bg: #E2ECF8;
      --s-prog: #3D6CB4;
      --s-hold-bg: #ECEBE8;
      --s-hold: #76716A;
      --s-done-bg: #DEF0E5;
      --s-done: #387A5C;
      --p-crit-bg: #F8E1DE;
      --p-crit: #B04840;
      --p-high-bg: #FAE4D0;
      --p-high: #B06C2E;
      --r-xs: 5px;
      --r-sm: 6px;
      --r: 10px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-full: 999px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --t: 0.25s;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .cc-nav {
      background: #111E30;
      padding: 0.4rem 2.5rem;
      display: flex;
      align-items: center;
    }

    .cc-nav a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s ease;
    }

    .cc-nav a:hover {
      color: rgba(255,255,255,0.7);
    }

    .loading-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      width: 0%;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 9999;
    }

    .loading-bar.active {
      opacity: 1;
      animation: loading 1.5s ease-in-out forwards;
    }

    @keyframes loading {
      0% { width: 0%; }
      50% { width: 80%; }
      100% { width: 100%; }
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem 2.5rem;
    }

    .tab-nav {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 0.75rem 1.5rem;
      background: none;
      border: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: all var(--t) var(--ease);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab-btn.active {
      color: var(--navy);
      border-bottom-color: var(--gold);
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.5rem;
      cursor: pointer;
      transition: all var(--t) var(--ease);
      box-shadow: var(--sh-xs);
    }

    .stat-card:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: var(--sh-sm);
    }

    .stat-card.active {
      background: var(--gold-glow);
      border-color: var(--gold);
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .stat-number {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--navy);
    }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 2.5rem 0 1.5rem 0;
      cursor: pointer;
      user-select: none;
    }

    .section-heading h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--navy);
    }

    .section-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: var(--gold-glow);
      border-radius: var(--r-xs);
      color: var(--gold);
      font-size: 0.75rem;
      transition: transform var(--t) var(--ease);
    }

    .section-toggle.collapsed {
      transform: rotate(-90deg);
    }

    .section-content {
      max-height: 2000px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .section-content.collapsed {
      max-height: 0;
    }

    .priorities-container {
      display: grid;
      gap: 1rem;
    }

    .priority-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: grab;
      transition: all var(--t) var(--ease);
      box-shadow: var(--sh-xs);
    }

    .priority-card:active {
      cursor: grabbing;
      opacity: 0.8;
    }

    .priority-rank {
      font-family: 'Fraunces', serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--gold);
      width: 2.5rem;
      text-align: center;
    }

    .priority-info {
      flex: 1;
    }

    .priority-name {
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }

    .priority-meta {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      padding: 0.4rem 0.75rem;
      border-radius: var(--r-full);
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-pill.queued {
      background: var(--s-queue-bg);
      color: var(--s-queue);
    }

    .status-pill.in-progress {
      background: var(--s-prog-bg);
      color: var(--s-prog);
    }

    .status-pill.on-hold {
      background: var(--s-hold-bg);
      color: var(--s-hold);
    }

    .status-pill.complete {
      background: var(--s-done-bg);
      color: var(--s-done);
    }

    .domain-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.4rem 0.75rem;
      background: rgba(61,108,180,0.06);
      color: var(--s-prog);
      border-radius: var(--r-full);
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .priority-due {
      font-size: 0.85rem;
      color: var(--text-2);
    }

    .week-container {
      display: grid;
      gap: 1.5rem;
    }

    .owner-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.5rem;
      box-shadow: var(--sh-xs);
    }

    .owner-name {
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .project-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem;
      border-radius: var(--r-sm);
      background: var(--bg);
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background var(--t) var(--ease);
    }

    .project-item:hover {
      background: var(--bg-stripe);
    }

    .project-item-name {
      color: var(--text);
      font-weight: 500;
    }

    .project-item-due {
      color: var(--text-3);
      font-size: 0.85rem;
    }

    .workload-bars {
      display: grid;
      gap: 1.25rem;
    }

    .workload-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.25rem;
      box-shadow: var(--sh-xs);
    }

    .workload-name {
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 0.75rem;
      font-size: 0.95rem;
    }

    .workload-bar-container {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: var(--r-full);
      overflow: hidden;
    }

    .workload-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: var(--r-full);
      transition: width var(--t) var(--ease);
    }

    .workload-label {
      font-size: 0.8rem;
      color: var(--text-2);
      margin-top: 0.5rem;
    }

    .goals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .goal-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.5rem;
      box-shadow: var(--sh-xs);
      transition: all var(--t) var(--ease);
    }

    .goal-card:hover {
      border-color: var(--gold);
      box-shadow: var(--sh-sm);
    }

    .goal-status-ring {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-inv-1);
    }

    .goal-status-ring.not-started {
      background: #E5E7EB;
      color: var(--text-3);
    }

    .goal-status-ring.in-progress {
      background: var(--gold);
    }

    .goal-status-ring.complete {
      background: var(--s-done);
    }

    .goal-title {
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }

    .goal-description {
      font-size: 0.9rem;
      color: var(--text-2);
      margin-bottom: 1rem;
    }

    .goal-actions {
      display: flex;
      gap: 0.5rem;
    }

    .goal-btn {
      padding: 0.5rem 1rem;
      background: var(--gold-glow);
      border: 1px solid var(--border-warm);
      border-radius: var(--r-sm);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gold);
      cursor: pointer;
      transition: all var(--t) var(--ease);
    }

    .goal-btn:hover {
      background: var(--gold-ring);
      border-color: var(--gold);
    }

    .calendar-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .calendar-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.5rem;
      box-shadow: var(--sh-xs);
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .calendar-header h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--navy);
    }

    .calendar-nav {
      display: flex;
      gap: 0.5rem;
    }

    .calendar-btn {
      padding: 0.4rem 0.8rem;
      background: var(--gold-glow);
      border: 1px solid var(--border-warm);
      border-radius: var(--r-sm);
      color: var(--gold);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all var(--t) var(--ease);
    }

    .calendar-btn:hover {
      background: var(--gold-ring);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.5rem;
    }

    .calendar-day-header {
      text-align: center;
      font-weight: 600;
      color: var(--text-2);
      font-size: 0.8rem;
      padding: 0.5rem 0;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all var(--t) var(--ease);
      position: relative;
    }

    .calendar-day:hover {
      background: var(--gold-glow);
      border-color: var(--gold);
    }

    .calendar-day.other-month {
      color: var(--text-3);
    }

    .calendar-day.today {
      background: var(--gold);
      color: var(--text-inv-1);
      font-weight: 600;
    }

    .calendar-day.has-event::after {
      content: '';
      position: absolute;
      bottom: 3px;
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
    }

    .filters-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-input, .filter-select {
      padding: 0.65rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      transition: all var(--t) var(--ease);
    }

    .filter-input::placeholder {
      color: var(--text-3);
    }

    .filter-input:focus, .filter-select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .filter-select {
      cursor: pointer;
    }

    .btn-clear {
      padding: 0.65rem 1rem;
      background: var(--border);
      border: none;
      border-radius: var(--r);
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: all var(--t) var(--ease);
    }

    .btn-clear:hover {
      background: var(--border-strong);
    }

    .btn-add {
      margin-left: auto;
      padding: 0.65rem 1.5rem;
      background: var(--gold);
      border: none;
      border-radius: var(--r);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      color: var(--text-inv-1);
      cursor: pointer;
      transition: all var(--t) var(--ease);
    }

    .btn-add:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: var(--sh-sm);
    }

    .table-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--sh-xs);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead {
      background: var(--bg);
      border-bottom: 2px solid var(--border);
    }

    th {
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      color: var(--text-2);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    tbody tr:hover {
      background: var(--bg);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .cell-star {
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform var(--t) var(--ease);
    }

    .cell-star:hover {
      transform: scale(1.2);
    }

    .cell-star.active {
      color: var(--gold);
    }

    .cell-editable {
      padding: 0;
    }

    .cell-editable span {
      display: block;
      padding: 1rem;
      cursor: text;
      border-radius: var(--r-sm);
      transition: all var(--t) var(--ease);
      outline: none;
    }

    .cell-editable span:hover {
      background: var(--gold-glow);
    }

    .cell-editable span:focus {
      background: var(--gold-glow);
      box-shadow: inset 0 0 0 2px var(--gold);
    }

    .cell-select, .cell-date {
      width: 100%;
      padding: 0.65rem;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem;
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
    }

    .cell-select:focus, .cell-date:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 2px var(--gold-glow);
    }

    .cell-due-date {
      font-weight: 500;
    }

    .cell-due-date.overdue {
      color: var(--p-crit);
      font-weight: 600;
    }

    .cell-due-date.due-soon {
      color: var(--p-high);
      font-weight: 600;
    }

    .cell-ai {
      cursor: pointer;
      transition: transform var(--t) var(--ease);
      text-align: center;
    }

    .cell-ai:hover {
      transform: scale(1.2);
    }

    .btn-delete {
      padding: 0.4rem 0.8rem;
      background: var(--p-crit-bg);
      border: 1px solid var(--p-crit);
      border-radius: var(--r-sm);
      color: var(--p-crit);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all var(--t) var(--ease);
    }

    .btn-delete:hover {
      background: var(--p-crit);
      color: var(--text-inv-1);
    }

    .detail-panel {
      position: fixed;
      right: -400px;
      top: 0;
      width: 400px;
      height: 100vh;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 16px rgba(0,0,0,0.1);
      z-index: 1000;
      transition: right var(--t) var(--ease);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .detail-panel.open {
      right: 0;
    }

    .detail-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .detail-title {
      font-family: 'Fraunces', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--navy);
    }

    .detail-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-2);
      transition: color var(--t) var(--ease);
    }

    .detail-close:hover {
      color: var(--text);
    }

    .detail-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    .detail-field {
      margin-bottom: 1.5rem;
    }

    .detail-label {
      display: block;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .detail-input, .detail-select, .detail-textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      transition: all var(--t) var(--ease);
    }

    .detail-input:focus, .detail-select:focus, .detail-textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .detail-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .detail-checkbox {
      margin-right: 0.75rem;
      cursor: pointer;
      width: 18px;
      height: 18px;
    }

    .detail-checkbox-group {
      display: flex;
      align-items: center;
    }

    .detail-readonly {
      padding: 0.75rem;
      background: var(--bg);
      border-radius: var(--r-sm);
      color: var(--text-2);
      font-size: 0.9rem;
    }

    .detail-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .detail-btn {
      flex: 1;
      padding: 0.75rem;
      border: none;
      border-radius: var(--r);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t) var(--ease);
    }

    .detail-btn-save {
      background: var(--gold);
      color: var(--text-inv-1);
    }

    .detail-btn-save:hover {
      background: var(--gold-light);
    }

    .detail-btn-cancel {
      background: var(--border);
      color: var(--text-2);
    }

    .detail-btn-cancel:hover {
      background: var(--border-strong);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border-radius: var(--r);

      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      box-shadow: var(--sh-md);
      animation: slideUp 0.3s var(--ease);
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-title {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;

      color: var(--text);

      outline: none;

      box-shadow: 0 0 0 3px var(--gold-glow);
    }

      resize: vertical;
      min-height: 80px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn-primary {
      flex: 1;
      padding: 0.75rem;
      background: var(--gold);
      border: none;
      border-radius: var(--r);
      font-weight: 600;
      color: var(--text-inv-1);
      cursor: pointer;
      transition: all var(--t) var(--ease);
    }

      background: var(--gold-light);
    }

    .btn-secondary {
      flex: 1;
      padding: 0.75rem;
      background: var(--border);
      border: none;
      border-radius: var(--r);

      color: var(--text-2);

      transition: all var(--t) var(--ease);
    }

    .btn-secondary:hover {
      background: var(--border-strong);
    }

    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 3000;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh-md);
      margin-bottom: 0.75rem;
      animation: slideIn 0.3s var(--ease);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast.success {
      border-left: 4px solid var(--s-done);
      color: var(--s-done);
    }

    .toast.error {
      border-left: 4px solid var(--p-crit);
      color: var(--p-crit);
    }

    .recurring-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.25rem;
      display: flex;

  </style>
</head>

  <script>
    const app = {
      data: {
        projects: [],
        recurring: [],
        calendarEvents: [],
        goals: [],
        meetings: [],
        professorships: []
      },
      currentDetailProject: null,
      currentMonth: new Date(),
      filters: {
        search: '',
        domain: '',
        status: '',
        owner: ''
      },
      priorityOrder: [],
      apiUrl: 'https://script.google.com/macros/s/AKfycbwDdeZBBx63c2Iexsd4Mrbt3lZ1bUjMdIJXlXV1QfRxD171i1GCvyaOmgGRsDxJIYk/exec',
      projectRowMap: {},

      async init() {
        this.loadLocalStorage();
        await this.fetchData();
        this.renderDashboard();
        this.attachEventListeners();
        this.setupAutoRefresh();
      },

      loadLocalStorage() {
        const stored = localStorage.getItem('cc-priority-order');
        if (stored) this.priorityOrder = JSON.parse(stored);
      },

      async fetchData() {
        this.showLoading();
        try {
          const response = await fetch(this.apiUrl);
          const result = await response.json();

          this.data.projects = (result.projects || []).map((p, idx) => {
            const mapped = this.mapProjectSchema(p);
            this.projectRowMap[mapped.ID] = p._row || idx + 2;
            return mapped;
          });

          this.data.recurring = result.recurring || [];
          this.data.calendarEvents = result.calendarEvents || [];
          this.data.goals = result.goals || [];
          this.data.meetings = this.getMeetingsFromStorage();
          this.data.professorships = this.getProfessionalshipsFromStorage();

          if (!this.priorityOrder.length) {
            this.priorityOrder = this.data.projects
              .filter(p => p.Leadership)
              .map((p, i) => ({ id: p.ID, rank: i + 1 }));
            this.savePriorityOrder();
          }
        } catch (error) {
          console.error('Fetch error:', error);
          this.showToast('Error loading data', 'error');
        } finally {
          this.hideLoading();
        }
      },

      mapProjectSchema(oldProject) {
        const statusMap = {
          'Not Started': 'Queued',
          'Planning': 'Queued',
          'In Progress': 'In-Progress',
          'In Review': 'In-Progress',
          'Delayed': 'On-Hold',
          'On Hold': 'On-Hold',
          'Complete': 'Complete'
        };

        const categoryMap = {
          'Finance': 'Finance',
          'Faculty': 'HR',
          'Operations': 'ORs',
          'Administrative': 'HR',
          'Strategy': 'Finance',
          'Analytics': 'BizIQ',
          'PCC': 'Prostate Cancer Center',
          'BizIQ': 'BizIQ',
          'Perioperative': 'ORs',
          'Clinics': 'Clinics'
        };

        const aiMap = {
          'AI Candidate': 'Candidate',
          'AI Pilot': 'Pilot',
          'AI Implemented': 'Implemented',
          'Yes': 'Candidate',
          'True': 'Candidate',
          '1': 'Candidate'
        };

        return {
          ID: oldProject.ID || oldProject.id || Math.random().toString(36).substr(2, 9),
          Project: oldProject.Project || '',
          Owner: oldProject.Owner || '',
          Stakeholder: oldProject['Key Stakeholder'] || '',
          Status: statusMap[oldProject.Status] || 'Queued',
          Domain: categoryMap[oldProject.Category] || 'Finance',
          DueDate: oldProject['Due Date'] || oldProject.DueDate || '',
          Leadership: oldProject['Leadership Status'] === 'Priority' || oldProject.Leadership === true,
          AI: aiMap[oldProject['AI Potential?']] || '',
          Notes: ((oldProject.Description || '') + (oldProject.Notes ? '\n' + oldProject.Notes : '')).trim(),
          LastUpdated: oldProject.LastUpdated || new Date().toISOString()
        };
      },

      renderDashboard() {
        this.renderStats();
        this.renderLeadershipPriorities();
        this.renderThisWeek();
        this.renderWorkload();
        this.renderGoals();
        this.renderCalendar('calendarView', this.currentMonth);
        this.renderUpcomingMeetings();
        this.populateFilterOptions();
        this.renderProjectsTable();
      },

      renderStats() {
        const container = document.getElementById('statsRow');
        const activeProjects = this.data.projects.filter(p => p.Status !== 'Complete');
        const queued = activeProjects.filter(p => p.Status === 'Queued').length;
        const inProgress = activeProjects.filter(p => p.Status === 'In-Progress').length;
        const onHold = activeProjects.filter(p => p.Status === 'On-Hold').length;
        const complete = this.data.projects.filter(p => p.Status === 'Complete').length;

        const stats = [
          { label: 'Total Active', value: activeProjects.length, filter: 'active' },
          { label: 'Queued', value: queued, filter: 'Queued' },
          { label: 'In-Progress', value: inProgress, filter: 'In-Progress' },
          { label: 'On-Hold', value: onHold, filter: 'On-Hold' },
          { label: 'Complete', value: complete, filter: 'Complete' }
        ];

        container.innerHTML = stats.map((stat, i) => `
          <div class="stat-card" onclick="app.filterByStatus('${stat.filter}')">
            <div class="stat-label">${stat.label}</div>
            <div class="stat-number">${stat.value}</div>
          </div>
        `).join('');
      },

      renderLeadershipPriorities() {
        const container = document.getElementById('prioritiesContainer');
        const priorities = this.data.projects.filter(p => p.Leadership);

        priorities.sort((a, b) => {
          const rankA = this.priorityOrder.find(po => po.id === a.ID)?.rank || 999;
          const rankB = this.priorityOrder.find(po => po.id === b.ID)?.rank || 999;
          return rankA - rankB;
        });

        if (priorities.length === 0) {
          container.innerHTML = '<div class="empty-state"><h3>No Leadership Priorities</h3><p>Star projects to add them here</p></div>';
          return;
        }

        container.innerHTML = priorities.map((project, idx) => {
          const dueDate = project.DueDate ? new Date(project.DueDate) : null;
          const dueDateStr = dueDate ? dueDate.toLocaleDateString() : 'No due date';

          return `
            <div class="priority-card" draggable="true" data-project-id="${project.ID}">
              <div class="priority-rank">${idx + 1}</div>
              <div class="priority-info">
                <div class="priority-name" onclick="app.openDetail('${project.ID}')" style="cursor: pointer;">${project.Project}</div>
                <div class="priority-meta">
                  <div class="status-pill ${project.Status.toLowerCase().replace('-', '-')}">${project.Status}</div>
                  <div class="domain-badge">${project.Domain}</div>
                  <div class="priority-due">${dueDateStr}</div>
                </div>
                <div style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-2);">Owner: ${project.Owner}</div>
              </div>
            </div>
          `;
        }).join('');

        this.setupPriorityDragDrop();
      },

      renderThisWeek() {
        const container = document.getElementById('weekContainer');
        const now = new Date();
        const weekEnd = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);

        const weekProjects = this.data.projects.filter(p => {
          const dueDate = p.DueDate ? new Date(p.DueDate) : null;
          return dueDate && dueDate >= now && dueDate <= weekEnd && p.Status !== 'Complete';
        });

        const groupedByOwner = {};
        weekProjects.forEach(p => {
          if (!groupedByOwner[p.Owner]) groupedByOwner[p.Owner] = [];
          groupedByOwner[p.Owner].push(p);
        });

        if (Object.keys(groupedByOwner).length === 0) {
          container.innerHTML = '<div class="empty-state"><h3>No Projects Due This Week</h3></div>';
          return;
        }

        container.innerHTML = Object.entries(groupedByOwner).map(([owner, projects]) => `
          <div class="owner-section">
            <div class="owner-name">${owner}</div>
            ${projects.map(p => {
              const dueDate = new Date(p.DueDate).toLocaleDateString();
              return `
                <div class="project-item" onclick="app.openDetail('${p.ID}')">
                  <div class="project-item-name">${p.Project}</div>
                  <div class="project-item-due">${dueDate}</div>
                </div>
              `;
            }).join('')}
          </div>
        `).join('');
      },

      renderWorkload() {
        const container = document.getElementById('workloadBars');
        const now = new Date();
        const thirtyDaysOut = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);

        const workloadProjects = this.data.projects.filter(p => {
          const dueDate = p.DueDate ? new Date(p.DueDate) : null;
          return dueDate && dueDate >= now && dueDate <= thirtyDaysOut && p.Status !== 'Complete';
        }).sort((a, b) => new Date(a.DueDate) - new Date(b.DueDate));

        if (workloadProjects.length === 0) {
          container.innerHTML = '<div class="empty-state"><h3>No Projects in 30 Days</h3></div>';
          return;
        }

        container.innerHTML = workloadProjects.map(p => {
          const dueDate = new Date(p.DueDate);
          const daysRemaining = Math.ceil((dueDate - now) / (24 * 60 * 60 * 1000));
          const percentage = Math.max(0, Math.min(100, (daysRemaining / 30) * 100));

          return `
            <div class="workload-item">
              <div class="workload-name">${p.Project}</div>
              <div class="workload-bar-container">
                <div class="workload-bar" style="width: ${percentage}%"></div>
              </div>
              <div class="workload-label">${daysRemaining} days remaining</div>
            </div>
          `;
        }).join('');
      },

      renderGoals() {
        const container = document.getElementById('goalsGrid');
        if (this.data.goals.length === 0) {
          container.innerHTML = '<div class="empty-state"><h3>No Goals</h3><p>Create goals for the team</p></div>';
          return;
        }

        container.innerHTML = this.data.goals.map((goal, idx) => {
          const statusClass = (goal.Status || 'not-started').toLowerCase();
          const statusText = goal.Status ? goal.Status.replace('-', ' ') : 'Not Started';

          return `
            <div class="goal-card">
              <div class="goal-status-ring ${statusClass}">${statusText[0]}</div>
              <div class="goal-title">${goal.Name || 'Untitled Goal'}</div>
              <div class="goal-description">${goal.Description || ''}</div>
              <div class="goal-actions">
                <button class="goal-btn" onclick="app.updateGoalStatus(${idx}, 'in-progress')">Progress</button>
                <button class="goal-btn" onclick="app.updateGoalStatus(${idx}, 'complete')">Complete</button>
              </div>
            </div>
          `;
        }).join('');
      },

      renderCalendar(elementId, month) {
        const container = document.getElementById(elementId);
        if (!container) return;

        const year = month.getFullYear();
        const monthNum = month.getMonth();

        const firstDay = new Date(year, monthNum, 1);
        const lastDay = new Date(year, monthNum + 1, 0);
        const daysInMonth = lastDay.getDate();
        const startingDayOfWeek = firstDay.getDay();

        let html = '<div class="calendar-grid">';

        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        dayNames.forEach(day => {
          html += `<div class="calendar-day-header">${day}</div>`;
        });

        for (let i = 0; i < startingDayOfWeek; i++) {
          html += '<div class="calendar-day other-month"></div>';
        }

        const today = new Date();
        for (let day = 1; day <= daysInMonth; day++) {
          const date = new Date(year, monthNum, day);
          const isToday = date.toDateString() === today.toDateString();
          const hasEvent = this.data.calendarEvents.some(e => {
            const eDate = new Date(e.Date);
            return eDate.toDateString() === date.toDateString();
          });

          const classes = `calendar-day ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}`;
          html += `<div class="${classes}" onclick="app.handleCalendarDayClick(new Date(${year}, ${monthNum}, ${day}))">${day}</div>`;
        }

        const remainingDays = 42 - (startingDayOfWeek + daysInMonth);
        for (let i = 0; i < remainingDays; i++) {
          html += '<div class="calendar-day other-month"></div>';
        }

        html += '</div>';
        container.innerHTML = html;
      },

      renderUpcomingMeetings() {
        const container = document.getElementById('upcomingMeetings');
        const meetings = this.getMeetingsFromStorage();
        const sorted = meetings.sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, 5);

        if (sorted.length === 0) {
          container.innerHTML = '<div class="empty-state"><h3>No Upcoming Meetings</h3></div>';
          return;
        }

        container.innerHTML = sorted.map(m => `
          <div class="goal-card" style="padding: 1rem;">
            <div style="font-weight: 600; color: var(--navy);">${m.title}</div>
            <div style="font-size: 0.85rem; color: var(--text-2); margin-top: 0.25rem;">${new Date(m.date).toLocaleDateString()} at ${m.time}</div>
          </div>
        `).join('');
      },

      populateFilterOptions() {
        const domains = ['Finance', 'ORs', 'Clinics', 'HR', 'BizIQ', 'Prostate Cancer Center'];
        const statuses = ['Queued', 'In-Progress', 'On-Hold', 'Complete'];
        const owners = [...new Set(this.data.projects.map(p => p.Owner))].filter(o => o);

        document.getElementById('filterDomain').innerHTML = '<option value="">All Domains</option>' +
          domains.map(d => `<option value="${d}">${d}</option>`).join('');

        document.getElementById('filterStatus').innerHTML = '<option value="">All Status</option>' +
          statuses.map(s => `<option value="${s}">${s}</option>`).join('');

        document.getElementById('filterOwner').innerHTML = '<option value="">All Owners</option>' +
          owners.map(o => `<option value="${o}">${o}</option>`).join('');
      },

      renderProjectsTable() {
        const tbody = document.getElementById('projectsBody');
        let filtered = this.data.projects;

        if (this.filters.search) {
          const search = this.filters.search.toLowerCase();
          filtered = filtered.filter(p =>
            p.Project.toLowerCase().includes(search) ||
            p.Owner.toLowerCase().includes(search) ||
            p.Notes.toLowerCase().includes(search)
          );
        }
        if (this.filters.domain) {
          filtered = filtered.filter(p => p.Domain === this.filters.domain);
        }
        if (this.filters.status) {
          filtered = filtered.filter(p => p.Status === this.filters.status);
        }
        if (this.filters.owner) {
          filtered = filtered.filter(p => p.Owner === this.filters.owner);
        }

        if (filtered.length === 0) {
          tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; padding: 2rem; color: var(--text-3);">No projects match your filters</td></tr>';
          return;
        }

        tbody.innerHTML = filtered.map(project => {
          const dueDate = project.DueDate ? new Date(project.DueDate) : null;
          const now = new Date();
          const isOverdue = dueDate && dueDate < now && project.Status !== 'Complete';
          const isDueSoon = dueDate && dueDate < new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000) && !isOverdue && project.Status !== 'Complete';

          const aiIcon = this.getAIIcon(project.AI);

          return `
            <tr>
              <td class="cell-star ${project.Leadership ? 'active' : ''}" onclick="app.toggleLeadership('${project.ID}')" title="Leadership flag">★</td>
              <td class="cell-editable"><span contenteditable="true" onblur="app.updateCell('${project.ID}', 'Project', this.textContent)" onclick="event.stopPropagation()">${project.Project}</span></td>
              <td>
                <select class="cell-select" value="${project.Domain}" onchange="app.updateCell('${project.ID}', 'Domain', this.value)">
                  <option value="Finance">Finance</option>
                  <option value="ORs">ORs</option>
                  <option value="Clinics">Clinics</option>
                  <option value="HR">HR</option>
                  <option value="BizIQ">BizIQ</option>
                  <option value="Prostate Cancer Center">Prostate Cancer Center</option>
                </select>
              </td>
              <td class="cell-editable"><span contenteditable="true" onblur="app.updateCell('${project.ID}', 'Owner', this.textContent)" onclick="event.stopPropagation()">${project.Owner}</span></td>
              <td class="cell-editable"><span contenteditable="true" onblur="app.updateCell('${project.ID}', 'Stakeholder', this.textContent)" onclick="event.stopPropagation()">${project.Stakeholder}</span></td>
              <td>
                <select class="cell-select" value="${project.Status}" onchange="app.updateCell('${project.ID}', 'Status', this.value)">
                  <option value="Queued">Queued</option>
                  <option value="In-Progress">In-Progress</option>
                  <option value="On-Hold">On-Hold</option>
                  <option value="Complete">Complete</option>
                </select>
              </td>
              <td class="cell-due-date ${isOverdue ? 'overdue' : isDueSoon ? 'due-soon' : ''}">
                <input type="date" class="cell-date" value="${project.DueDate}" onchange="app.updateCell('${project.ID}', 'DueDate', this.value)">
              </td>
              <td class="cell-ai" onclick="app.cycleAI('${project.ID}')" title="Click to cycle AI status">${aiIcon}</td>
              <td class="cell-editable"><span contenteditable="true" onblur="app.updateCell('${project.ID}', 'Notes', this.textContent)" onclick="event.stopPropagation()" style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;">${project.Notes}</span></td>
              <td><button class="btn-delete" onclick="app.deleteProject('${project.ID}')">Delete</button></td>
            </tr>
          `;
        }).join('');
      },

      getAIIcon(aiValue) {
        const icons = {
          'Candidate': '🔍',
          'Pilot': '⚡',
          'Implemented': '✓'
        };
        return icons[aiValue] || '○';
      },

      openDetail(projectId) {
        const project = this.data.projects.find(p => p.ID === projectId);
        if (!project) return;

        this.currentDetailProject = project;

        document.getElementById('detailTitle').textContent = project.Project;
        document.getElementById('detailName').value = project.Project;
        document.getElementById('detailOwner').value = project.Owner;
        document.getElementById('detailStakeholder').value = project.Stakeholder;
        document.getElementById('detailStatus').value = project.Status;
        document.getElementById('detailDomain').value = project.Domain;
        document.getElementById('detailDueDate').value = project.DueDate;
        document.getElementById('detailLeadership').checked = project.Leadership;
        document.getElementById('detailAI').value = project.AI;
        document.getElementById('detailNotes').value = project.Notes;
        document.getElementById('detailID').textContent = project.ID;
        document.getElementById('detailUpdated').textContent = new Date(project.LastUpdated).toLocaleDateString();

        document.getElementById('detailPanel').classList.add('open');
      },

      closeDetail() {
        document.getElementById('detailPanel').classList.remove('open');
        this.currentDetailProject = null;
      },

      async saveDetail() {
        if (!this.currentDetailProject) return;

        const updates = {
          Project: document.getElementById('detailName').value,
          Owner: document.getElementById('detailOwner').value,
          Stakeholder: document.getElementById('detailStakeholder').value,
          Status: document.getElementById('detailStatus').value,
          Domain: document.getElementById('detailDomain').value,
          DueDate: document.getElementById('detailDueDate').value,
          Leadership: document.getElementById('detailLeadership').checked,
          AI: document.getElementById('detailAI').value,
          Notes: document.getElementById('detailNotes').value
        };

        Object.assign(this.currentDetailProject, updates);
        this.currentDetailProject.LastUpdated = new Date().toISOString();

        for (const [key, value] of Object.entries(updates)) {
          await this.updateSheet(this.currentDetailProject.ID, key, value);
        }

        this.closeDetail();
        this.renderDashboard();
        this.showToast('Project updated successfully', 'success');
      },

      openAddModal() {
        document.getElementById('addProjectModal').classList.add('active');
      },

      closeAddModal() {
        document.getElementById('addProjectModal').classList.remove('active');
        this.clearAddModalFields();
      },

      clearAddModalFields() {
        document.getElementById('modalName').value = '';
        document.getElementById('modalOwner').value = '';
        document.getElementById('modalStakeholder').value = '';
        document.getElementById('modalDomain').value = 'Finance';
        document.getElementById('modalStatus').value = 'Queued';
        document.getElementById('modalDueDate').value = '';
        document.getElementById('modalLeadership').checked = false;
        document.getElementById('modalAI').value = '';
        document.getElementById('modalNotes').value = '';
      },

      async submitAddProject() {
        const newProject = {
          Project: document.getElementById('modalName').value,
          Owner: document.getElementById('modalOwner').value,
          Stakeholder: document.getElementById('modalStakeholder').value,
          Domain: document.getElementById('modalDomain').value,
          Status: document.getElementById('modalStatus').value,
          DueDate: document.getElementById('modalDueDate').value,
          Leadership: document.getElementById('modalLeadership').checked,
          AI: document.getElementById('modalAI').value,
          Notes: document.getElementById('modalNotes').value,
          ID: Math.random().toString(36).substr(2, 9),
          LastUpdated: new Date().toISOString()
        };

        if (!newProject.Project || !newProject.Owner) {
          this.showToast('Project name and owner are required', 'error');
          return;
        }

        this.data.projects.push(newProject);

        try {
          await fetch(this.apiUrl, {
            method: 'POST',
            body: JSON.stringify({
              action: 'add',
              Project: newProject.Project,
              Owner: newProject.Owner,
              'Key Stakeholder': newProject.Stakeholder,
              Category: newProject.Domain,
              Status: newProject.Status,
              'Due Date': newProject.DueDate,
              'Leadership Status': newProject.Leadership ? 'Priority' : 'Standard Work',
              'AI Potential?': newProject.AI || '',
              Notes: newProject.Notes
            })
          });

          this.closeAddModal();
          this.renderDashboard();
          this.showToast('Project added successfully', 'success');
        } catch (error) {
          console.error('Error adding project:', error);
          this.showToast('Error adding project', 'error');
        }
      },

      async updateCell(projectId, field, value) {
        const project = this.data.projects.find(p => p.ID === projectId);
        if (!project) return;

        project[field] = value;
        project.LastUpdated = new Date().toISOString();

        await this.updateSheet(projectId, field, value);
        this.renderProjectsTable();
        this.renderDashboard();
      },

      async updateSheet(projectId, field, value) {
        const project = this.data.projects.find(p => p.ID === projectId);
        if (!project) return;

        const row = this.projectRowMap[projectId];
        const fieldMap = {
          'Project': 'Project',
          'Owner': 'Owner',
          'Stakeholder': 'Key Stakeholder',
          'Status': 'Status',
          'Domain': 'Category',
          'DueDate': 'Due Date',
          'Leadership': 'Leadership Status',
          'AI': 'AI Potential?',
          'Notes': 'Notes'
        };

        const sheetField = fieldMap[field];
        let sheetValue = value;

        if (field === 'Leadership') {
          sheetValue = value ? 'Priority' : 'Standard Work';
        } else if (field === 'Domain') {
          sheetValue = value;
        }

        try {
          await fetch(this.apiUrl, {
            method: 'POST',
            body: JSON.stringify({
              action: 'update',
              row: row,
              column: sheetField,
              value: sheetValue
            })
          });
        } catch (error) {
          console.error('Sheet update error:', error);
        }
      },

      async toggleLeadership(projectId) {
        const project = this.data.projects.find(p => p.ID === projectId);
        if (!project) return;

        project.Leadership = !project.Leadership;
        project.LastUpdated = new Date().toISOString();

        if (project.Leadership && !this.priorityOrder.find(po => po.id === projectId)) {
          const rank = Math.max(...this.priorityOrder.map(po => po.rank), 0) + 1;
          this.priorityOrder.push({ id: projectId, rank });
          this.savePriorityOrder();
        }

        await this.updateSheet(projectId, 'Leadership', project.Leadership);
        this.renderDashboard();
        this.showToast(`Project ${project.Leadership ? 'added to' : 'removed from'} leadership dashboard`, 'success');
      },

      async cycleAI(projectId) {
        const project = this.data.projects.find(p => p.ID === projectId);
        if (!project) return;

        const states = ['', 'Candidate', 'Pilot', 'Implemented'];
        const currentIndex = states.indexOf(project.AI);
        project.AI = states[(currentIndex + 1) % states.length];
        project.LastUpdated = new Date().toISOString();

        await this.updateSheet(projectId, 'AI', project.AI);
        this.renderProjectsTable();
      },

      async deleteProject(projectId) {
        if (!confirm('Are you sure you want to delete this project?')) return;

        const row = this.projectRowMap[projectId];
        this.data.projects = this.data.projects.filter(p => p.ID !== projectId);

        try {
          await fetch(this.apiUrl, {
            method: 'POST',
            body: JSON.stringify({
              action: 'delete',
              row: row
            })
          });

          this.renderDashboard();
          this.showToast('Project deleted successfully', 'success');
        } catch (error) {
          console.error('Delete error:', error);
          this.showToast('Error deleting project', 'error');
        }
      },

      filterByStatus(status) {
        if (status === 'active') {
          this.filters.status = '';
        } else {
          this.filters.status = status;
        }
        document.getElementById('filterStatus').value = this.filters.status;
        this.renderProjectsTable();
      },

      async updateGoalStatus(index, status) {
        const goal = this.data.goals[index];
        if (!goal) return;

        goal.Status = status;

        try {
          await fetch(this.apiUrl, {
            method: 'POST',
            body: JSON.stringify({
              action: 'goal_update',
              index,
              status
            })
          });

          this.renderGoals();
          this.showToast('Goal updated', 'success');
        } catch (error) {
          console.error('Goal update error:', error);
        }
      },

      calendar: {
        previousMonth() {
          app.currentMonth = new Date(app.currentMonth.getFullYear(), app.currentMonth.getMonth() - 1, 1);
          app.renderCalendar('calendarViewFull', app.currentMonth);
        },
        nextMonth() {
          app.currentMonth = new Date(app.currentMonth.getFullYear(), app.currentMonth.getMonth() + 1, 1);
          app.renderCalendar('calendarViewFull', app.currentMonth);
        }
      },

      handleCalendarDayClick(date) {
        const events = this.data.calendarEvents.filter(e =>
          new Date(e.Date).toDateString() === date.toDateString()
        );
      },

      getMeetingsFromStorage() {
        const stored = localStorage.getItem('cc-meetings');
        return stored ? JSON.parse(stored) : [];
      },

      getProfessionalshipsFromStorage() {
        const stored = localStorage.getItem('cc-professorships');
        return stored ? JSON.parse(stored) : [];
      },

      setupPriorityDragDrop() {
        const cards = document.querySelectorAll('.priority-card');
        let draggedElement = null;

        cards.forEach(card => {
          card.addEventListener('dragstart', (e) => {
            draggedElement = card;
            card.style.opacity = '0.5';
          });

          card.addEventListener('dragend', (e) => {
            card.style.opacity = '1';
          });

          card.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (draggedElement === card) return;

            const container = document.getElementById('prioritiesContainer');
            const allCards = Array.from(container.querySelectorAll('.priority-card'));
            const draggedIndex = allCards.indexOf(draggedElement);
            const targetIndex = allCards.indexOf(card);

            if (draggedIndex < targetIndex) {
              card.parentNode.insertBefore(draggedElement, card.nextSibling);
            } else {
              card.parentNode.insertBefore(draggedElement, card);
            }

            this.updatePriorityOrder();
          });
        });
      },

      updatePriorityOrder() {
        const cards = document.querySelectorAll('.priority-card');
        const newOrder = Array.from(cards).map((card, idx) => ({
          id: card.getAttribute('data-project-id'),
          rank: idx + 1
        }));

        this.priorityOrder = newOrder;
        this.savePriorityOrder();
      },

      savePriorityOrder() {
        localStorage.setItem('cc-priority-order', JSON.stringify(this.priorityOrder));
      },

      showLoading() {
        document.getElementById('loadingBar').classList.add('active');
      },

      hideLoading() {
        document.getElementById('loadingBar').classList.remove('active');
      },

      showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
          <span>${type === 'success' ? '✓' : '!'}</span>
          <span>${message}</span>
        `;
        container.appendChild(toast);

        setTimeout(() => {
          toast.remove();
        }, 3000);
      },

      setupAutoRefresh() {
        setInterval(() => {
          this.fetchData();
          this.renderDashboard();
        }, 5 * 60 * 1000);
      },

      attachEventListeners() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const tabName = e.target.getAttribute('data-tab');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');

            if (tabName === 'calendar') {
              app.renderCalendar('calendarViewFull', app.currentMonth);
              app.renderRecurring();
              app.renderProfessorships();
            }
          });
        });

        document.getElementById('searchInput').addEventListener('change', (e) => {
          this.filters.search = e.target.value;
          this.renderProjectsTable();
        });

        document.getElementById('filterDomain').addEventListener('change', (e) => {
          this.filters.domain = e.target.value;
          this.renderProjectsTable();
        });

        document.getElementById('filterStatus').addEventListener('change', (e) => {
          this.filters.status = e.target.value;
          this.renderProjectsTable();
        });

        document.getElementById('filterOwner').addEventListener('change', (e) => {
          this.filters.owner = e.target.value;
          this.renderProjectsTable();
        });

        document.getElementById('clearFilters').addEventListener('click', () => {
          this.filters = { search: '', domain: '', status: '', owner: '' };
          document.getElementById('searchInput').value = '';
          document.getElementById('filterDomain').value = '';
          document.getElementById('filterStatus').value = '';
          document.getElementById('filterOwner').value = '';
          this.renderProjectsTable();
        });

        document.getElementById('addProjectBtn').addEventListener('click', () => {
          this.openAddModal();
        });

        document.getElementById('addProjectModal').addEventListener('click', (e) => {
          if (e.target === document.getElementById('addProjectModal')) {
            this.closeAddModal();
          }
        });
      }
    };

    app.renderRecurring = function() {
      const container = document.getElementById('recurringCards');
      if (!container) return;

      if (this.data.recurring.length === 0) {
        container.innerHTML = '<div class="empty-state"><h3>No Recurring Obligations</h3></div>';
        return;
      }

      container.innerHTML = this.data.recurring.map(r => `
        <div class="recurring-card">
          <div>
            <div class="recurring-name">${r.Name || 'Untitled'}</div>
            <div class="recurring-freq">${r.Frequency || 'Weekly'}</div>
          </div>
          <div style="color: var(--gold);">${r.Complete ? '✓' : '○'}</div>
        </div>
      `).join('');

      const heatmap = document.getElementById('recurringHeatmap');
      if (heatmap) {
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        heatmap.innerHTML = days.map(day => {
          const intensity = Math.random() > 0.6 ? 'high' : Math.random() > 0.3 ? 'medium' : 'low';
          return `<div class="heatmap-day ${intensity}">${day[0]}</div>`;
        }).join('');
      }
    };

    app.renderProfessorships = function() {
      const container = document.getElementById('profList');
      if (!container) return;

      if (this.data.professorships.length === 0) {
        container.innerHTML = '<div class="empty-state"><h3>No Professorships</h3></div>';
        return;
      }

      container.innerHTML = this.data.professorships.map(p => `
        <div class="prof-item">
          <div>
            <div class="prof-name">${p.name}</div>
            <div class="prof-role">${p.role || 'Professor'}</div>
          </div>
        </div>
      `).join('');
    };

    function toggleSection(element) {
      const toggle = element.querySelector('.section-toggle');
      const content = element.nextElementSibling;

      toggle.classList.toggle('collapsed');
      content.classList.toggle('collapsed');

      const sections = localStorage.getItem('cc-sections') || '{}';
      const state = JSON.parse(sections);
      state[element.querySelector('h2').textContent] = toggle.classList.contains('collapsed');
      localStorage.setItem('cc-sections', JSON.stringify(state));
    }

    window.addEventListener('load', () => {
      const sections = JSON.parse(localStorage.getItem('cc-sections') || '{}');
      document.querySelectorAll('.section-heading').forEach(heading => {
        const title = heading.querySelector('h2').textContent;
        if (sections[title]) {
          heading.querySelector('.section-toggle').classList.add('collapsed');
          heading.nextElementSibling.classList.add('collapsed');
        }
      });

      app.init();
    });
  </script>
</body>
</html>
